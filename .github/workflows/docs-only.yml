name: docs-only

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files exist
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "README.md"
            "LICENSE"
            "docs/design-basis.md"
            "skills/rust-builder/SKILL.md"
            "skills/rust-builder/agents/openai.yaml"
            "skills/rust-reviewer/SKILL.md"
            "skills/rust-reviewer/agents/openai.yaml"
            "skills/rust-qa-auditor/SKILL.md"
            "skills/rust-qa-auditor/agents/openai.yaml"
            "instructions/rust.instructions.md"
            "prompts/rust-red.prompt.md"
            "prompts/rust-refactor.prompt.md"
            "examples/repo-layout-example.md"
            "examples/cargo-ci-example.md"
            "examples/usage-examples.md"
          )
          for file in "${required_files[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done

      - name: Verify README headings
        shell: bash
        run: |
          set -euo pipefail
          required_headings=(
            "## Overview"
            "## What This Pack Is Based On"
            "## Primary Sources"
            "## Roles"
            "## Expected Verification Evidence"
            "## Installation"
            "## Usage Patterns"
            "## Example Workflow"
            "## Limitations"
            "## Non-Goals"
            "## License"
          )
          for heading in "${required_headings[@]}"; do
            grep -Fq "$heading" README.md || { echo "Missing README heading: $heading"; exit 1; }
          done

      - name: Verify skill sections
        shell: bash
        run: |
          set -euo pipefail
          check_headings() {
            local file="$1"
            shift
            for heading in "$@"; do
              grep -Fq "$heading" "$file" || { echo "Missing heading '$heading' in $file"; exit 1; }
            done
          }

          check_headings "skills/rust-builder/SKILL.md" \
            "## Purpose" \
            "## When to use" \
            "## Inputs expected" \
            "## Build/implementation checklist" \
            "## Expected outputs" \
            "## Required evidence"

          check_headings "skills/rust-reviewer/SKILL.md" \
            "## Purpose" \
            "## When to use" \
            "## Review priorities" \
            "## Findings format" \
            "## Required evidence" \
            "## Non-goals"

          check_headings "skills/rust-qa-auditor/SKILL.md" \
            "## Purpose" \
            "## When to use" \
            "## Evidence checklist" \
            "## Decision rules" \
            "## Output contract"

      - name: Verify primary-source basis and evidence consistency
        shell: bash
        run: |
          set -euo pipefail

          combined_sources="$(cat README.md docs/design-basis.md)"
          required_urls=(
            "https://doc.rust-lang.org/stable/book/"
            "https://doc.rust-lang.org/stable/reference/"
            "https://rust-lang.github.io/api-guidelines/"
            "https://doc.rust-lang.org/cargo/commands/cargo-fmt.html"
            "https://doc.rust-lang.org/clippy/"
            "https://doc.rust-lang.org/cargo/commands/cargo-test.html"
            "https://rustsec.org/"
            "https://docs.rs/crate/cargo-audit/latest"
          )
          for url in "${required_urls[@]}"; do
            grep -Fq "$url" <<<"$combined_sources" || { echo "Missing source URL: $url"; exit 1; }
          done

          grep -Fq "## Primary Sources" README.md || { echo "README missing Primary Sources section"; exit 1; }
          grep -Fq "## Limitations" README.md || { echo "README missing Limitations section"; exit 1; }

          required_roles=("rust-builder" "rust-reviewer" "rust-qa-auditor")
          for role in "${required_roles[@]}"; do
            grep -Fq "$role" README.md || { echo "README missing role $role"; exit 1; }
            grep -Fq "$role" examples/usage-examples.md || { echo "usage-examples missing role $role"; exit 1; }
            grep -Fq "$role" "skills/$role/SKILL.md" || { echo "skill file missing role $role"; exit 1; }
          done

          grep -Fq "## Minimal baseline" examples/cargo-ci-example.md || { echo "cargo-ci-example missing minimal baseline"; exit 1; }
          grep -Fq "## Workspace baseline" examples/cargo-ci-example.md || { echo "cargo-ci-example missing workspace baseline"; exit 1; }
          grep -Fq "## Strict profile additions" examples/cargo-ci-example.md || { echo "cargo-ci-example missing strict profile additions"; exit 1; }

          profile_commands=(
            "cargo fmt --check"
            "cargo clippy -- -D warnings"
            "cargo test"
            "cargo audit"
            "cargo fmt --all -- --check"
            "cargo clippy --workspace --all-targets --all-features -- -D warnings"
            "cargo test --workspace --all-targets --all-features"
            "cargo deny check"
          )
          for command in "${profile_commands[@]}"; do
            grep -Fq "$command" README.md || { echo "README missing evidence command: $command"; exit 1; }
            grep -Fq "$command" examples/cargo-ci-example.md || { echo "cargo-ci-example missing evidence command: $command"; exit 1; }
          done

          grep -Fq "bootstrap blocker" README.md || { echo "README missing bootstrap blocker guidance"; exit 1; }
          grep -Fq "bootstrap blocker" examples/cargo-ci-example.md || { echo "cargo-ci-example missing bootstrap blocker guidance"; exit 1; }
